# @name: Minimal
# @description: Clean and distraction-free — no titlebar, no blur, just code
# @author: ghostty-rice
# @tags: dark, minimal, clean

theme = Builtin Tango Dark
background-opacity = 1.0
macos-titlebar-style = hidden
window-decoration = false
window-padding-x = 20
window-padding-y = 16
cursor-style = bar
cursor-style-blink = false
cursor-color = cell-foreground
cursor-text = cell-background
