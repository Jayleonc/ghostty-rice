# @name: Frosted
# @description: macOS native frosted glass with Catppuccin Latte (light mode)
# @author: ghostty-rice
# @tags: light, glass, macos, native

theme = Catppuccin Latte
background-opacity = 0.80
background-blur = macos-glass-clear
macos-titlebar-style = transparent
macos-icon = glass
window-padding-x = 14
window-padding-y = 10
cursor-style = block
cursor-style-blink = true
cursor-color = cell-foreground
cursor-text = cell-background
